<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Primary meta (overridden per-tenant by React on load) -->
    <title>Cita24 — Agenda tu Cita</title>
    <meta name="description" content="Agenda tu cita en segundos, sin llamadas ni esperas. Reservas online rápidas y fáciles." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (updated dynamically by React with tenant business name) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Cita24" />
    <meta property="og:title" content="Cita24 — Agenda tu Cita" />
    <meta property="og:description" content="Agenda tu cita en segundos, sin llamadas ni esperas." />
    <meta property="og:locale" content="es_MX" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Cita24 — Agenda tu Cita" />
    <meta name="twitter:description" content="Agenda tu cita en segundos, sin llamadas ni esperas." />

    <!-- Theme color -->
    <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
