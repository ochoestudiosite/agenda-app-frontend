<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Primary meta (overridden per-tenant by React on load) -->
    <title>Agenda tu Cita - Cita24.com</title>
    <meta name="description" content="Agenda tu cita en segundos, sin llamadas ni esperas. Reservas online rápidas y fáciles." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (updated dynamically by React with tenant business name) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Cita24" />
    <meta property="og:title" content="Agenda tu Cita - Cita24.com" />
    <meta property="og:description" content="Agenda tu cita en segundos, sin llamadas ni esperas." />
    <meta property="og:locale" content="es_MX" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Agenda tu Cita - Cita24.com" />
    <meta name="twitter:description" content="Agenda tu cita en segundos, sin llamadas ni esperas." />

    <!-- Theme color -->
    <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />

    <!-- Apply tenant brand color synchronously from cache before React loads.
         Eliminates the flash of the CSS-default green (#00B87A) on hard refresh
         when the React Query background refetch hasn't completed yet.
         External file (not inline) so CSP script-src 'self' allows it. -->
    <script src="/brand-init.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
